<!DOCTYPE html>
<html>
    <head>
      <link rel="stylesheet" href="css/home.css">
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
      <script>
      $(document).ready(function(){

        var mousePos = {};

       function getRandomInt(min, max) {
         return Math.round(Math.random() * (max - min + 1)) + min;
       }

        $(window).mousemove(function(e) {
          mousePos.x = e.pageX;
          mousePos.y = e.pageY;
        });

        $(window).mouseleave(function(e) {
          mousePos.x = -1;
          mousePos.y = -1;
        });

        var draw = setInterval(function(){
          if(mousePos.x > 0 && mousePos.y > 0){
            var range = 15;
            var color = "background: rgb("+getRandomInt(0,255)+","+getRandomInt(0,255)+","+getRandomInt(0,255)+");";
            var sizeInt = getRandomInt(10, 30);
            size = "height: " + sizeInt + "px; width: " + sizeInt + "px;";
            var left = "left: " + getRandomInt(mousePos.x-range-sizeInt, mousePos.x+range) + "px;";
            var top = "top: " + getRandomInt(mousePos.y-range-sizeInt, mousePos.y+range) + "px;";
            var style = left+top+color+size;
            $("<div class='ball' style='" + style + "'></div>").appendTo('#wrap').one("webkitAnimationEnd mozAnimationEnd MSAnimationEnd oanimationend animationend", function(){$(this).remove();});
          }
        }, 1);
      });
    </script>
    </head>
    <body>
        <div id="wrap">
            <div class="header">
                <h1>
                  <p>Giulia Cantini</p>
                </h1>
                <div class="header-icons">
                  <a aria-label="Send email" href="mailto:giuliacantini3@gmail.com"><i class="icon fa fa-envelope"></i></a>
                  <a aria-label="My Github" target="_blank" href="https://github.com/giulic3"><i class="icon fa fa-github-alt" aria-hidden="true"></i></a>
                  <a aria-label="My Linkedin" target="_blank" href="https://www.linkedin.com/in/giulia-cantini-317605109/"><i class="icon fa fa-linkedin" aria-hidden="true"></i></a>
                  <a aria-label="My Twitter" target="_blank" href="https://twitter.com/ggiuliacantini"><i class="icon fa fa-twitter" aria-hidden="true"></i></a>
                </div>
            </div>
        </div>
    </body>
</html>
